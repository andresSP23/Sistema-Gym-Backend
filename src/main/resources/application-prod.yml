server:
  port: ${PORT:8080}


spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10 # Optimizado para DBs compartidas (ej. Railway Starter)
      minimum-idle: 2       # Mantener conexiones listas
      idle-timeout: 300000  # 5 minutos
      connection-timeout: 20000 # 20 segundos
      max-lifetime: 1800000 # 30 minutos (evita errores de firewall)
  jpa:
    hibernate:
      ddl-auto: validate # Production mode: validate schema matches code
    show-sql: false      # Desactivar logs de SQL en producción por performance y seguridad
    properties:
      hibernate:
        format_sql: false
    database: PostgreSQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    # En producción, flyway validará y migrará.

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET} # Debe inyectarse como variable de entorno
      expiration: ${JWT_EXPIRATION:8640000}

logging:
  level:
    root: INFO
    com.ansicode: INFO # Ajustar según necesidad, pero DEBUG fuera de prod

app:
  storage:
    comprobantes-dir: /data/comprobantes
    contratos-dir: /data/contratos
