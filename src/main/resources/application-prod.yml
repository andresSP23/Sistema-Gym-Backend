server:
  port: ${PORT:8080}


spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Production mode: validate schema matches code
    show-sql: false      # Desactivar logs de SQL en producción por performance y seguridad
    properties:
      hibernate:
        format_sql: false
    database: PostgreSQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    # En producción, flyway validará y migrará.

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET} # Debe inyectarse como variable de entorno
      expiration: ${JWT_EXPIRATION:8640000}

logging:
  level:
    root: INFO
    com.ansicode: INFO # Ajustar según necesidad, pero DEBUG fuera de prod

app:
  storage:
    comprobantes-dir: /tmp/storage/comprobantes
    contratos-dir: /tmp/uploads/contratos
