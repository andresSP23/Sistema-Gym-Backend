# ============================================================
# CI/CD Pipeline — Deploy Spring Boot to AWS EC2
# ============================================================
# Triggers on push to 'main' branch.
# Builds Docker image, pushes to Docker Hub, then SSHs into
# EC2 to pull and restart the container.
# ============================================================

name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/gym-backend
  CONTAINER_NAME: gym-backend

jobs:

  # ──────────────────────────────────────────
  # 1. BUILD & TEST
  # ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw verify -B

  # ──────────────────────────────────────────
  # 2. BUILD DOCKER IMAGE & PUSH TO DOCKER HUB
  # ──────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  # ──────────────────────────────────────────
  # 3. DEPLOY TO EC2 VIA SSH
  # ──────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest image
            docker pull ${{ env.DOCKER_IMAGE }}:latest

            # Stop and remove old container (if running)
            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            # Run new container
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /data/comprobantes:/data/comprobantes \
              -v /data/contratos:/data/contratos \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_PORT=5432 \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e JWT_EXPIRATION=86400000 \
              -e SPRING_MAIL_HOST=smtp.gmail.com \
              -e SPRING_MAIL_PORT=587 \
              -e SPRING_MAIL_USERNAME=${{ secrets.SPRING_MAIL_USERNAME }} \
              -e SPRING_MAIL_PASSWORD=${{ secrets.SPRING_MAIL_PASSWORD }} \
              ${{ env.DOCKER_IMAGE }}:latest

            # Clean up old images
            docker image prune -f

            # Wait and verify health
            echo "Waiting 30s for app to start..."
            sleep 30
            curl -f http://localhost:8080/api/v1/actuator/health || echo "Health check failed!"
