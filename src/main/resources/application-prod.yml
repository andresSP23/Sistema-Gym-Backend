server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1/

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: none # Desactivado para acelerar el arranque (las tablas ya existen)
    show-sql: false
    open-in-view: false # Mejora el rendimiento y evita warnings
    properties:   
      hibernate:
        format_sql: false
    database: PostgreSQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:86400000} # 24 horas por defecto

logging:
  level:
    root: INFO
    com.ansicode: INFO

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when_authorized

app:
  storage:
    comprobantes-dir: /data/comprobantes
    contratos-dir: /data/contratos
